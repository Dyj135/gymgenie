<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymGenie — Personalised Workout Plan Generator</title>

  <!-- Tailwind (CDN) + project design tokens, mirrored from the Stitch design system -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;700&family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#131313',
            surface: '#131313',
            'surface-dim': '#131313',
            'surface-bright': '#393939',
            'surface-container-lowest': '#0e0e0e',
            'surface-container-low': '#1c1b1b',
            'surface-container': '#201f1f',
            'surface-container-high': '#2a2a2a',
            'surface-container-highest': '#353534',
            'surface-variant': '#353534',
            'on-surface': '#e5e2e1',
            'on-surface-variant': '#c4c9ac',
            'on-background': '#e5e2e1',
            'inverse-surface': '#e5e2e1',
            'inverse-on-surface': '#313030',
            'inverse-primary': '#506600',
            outline: '#8e9379',
            'outline-variant': '#444933',
            'surface-tint': '#abd600',
            primary: '#ffffff',
            'on-primary': '#283500',
            'primary-container': '#c3f400',
            'on-primary-container': '#556d00',
            'primary-fixed': '#c3f400',
            'primary-fixed-dim': '#abd600',
            'on-primary-fixed': '#161e00',
            'on-primary-fixed-variant': '#3c4d00',
            secondary: '#ffb59a',
            'on-secondary': '#5a1b00',
            'secondary-container': '#ff5e07',
            'on-secondary-container': '#531900',
            'secondary-fixed': '#ffdbce',
            'secondary-fixed-dim': '#ffb59a',
            'on-secondary-fixed': '#370e00',
            'on-secondary-fixed-variant': '#802a00',
            tertiary: '#ffffff',
            'on-tertiary': '#21323e',
            'tertiary-container': '#d2e5f5',
            'on-tertiary-container': '#556774',
            'tertiary-fixed': '#d2e5f5',
            'tertiary-fixed-dim': '#b6c9d8',
            'on-tertiary-fixed': '#0b1d29',
            'on-tertiary-fixed-variant': '#374956',
            error: '#ffb4ab',
            'on-error': '#690005',
            'error-container': '#93000a',
            'on-error-container': '#ffdad6',
          },
          borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
          spacing: {
            'container-max-width': '1200px',
            gutter: '16px',
            'base-unit': '8px',
            'margin-desktop': '40px',
            'margin-mobile': '20px',
          },
          fontFamily: {
            'headline-lg': ['Archivo Narrow'],
            'headline-lg-mobile': ['Archivo Narrow'],
            'display-metric': ['Archivo Narrow'],
            'data-point': ['Geist'],
            'label-caps': ['Geist'],
            'body-md': ['Inter'],
          },
          fontSize: {
            'headline-lg': ['32px', { lineHeight: '40px', fontWeight: '700' }],
            'headline-lg-mobile': ['24px', { lineHeight: '30px', fontWeight: '700' }],
            'display-metric': ['64px', { lineHeight: '64px', letterSpacing: '-0.02em', fontWeight: '700' }],
            'data-point': ['20px', { lineHeight: '24px', fontWeight: '700' }],
            'label-caps': ['12px', { lineHeight: '16px', letterSpacing: '0.05em', fontWeight: '600' }],
            'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #131313; color: #e5e2e1; font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .soft-glow-primary { box-shadow: 0px 8px 24px rgba(195, 244, 0, 0.15); }
    .selected-glow { box-shadow: 0 0 20px rgba(171, 214, 0, 0.15); }
    .glow-button { box-shadow: 0 0 15px rgba(195, 244, 0, 0.3); }
    .kinetic-hover:hover { transform: translateY(-2px); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .bento-card { background: #1e1e1e; border: 1px solid #2a2a2a; transition: all 0.3s ease; }
    .bento-card:hover { border-color: #c3f400; box-shadow: 0 0 20px rgba(195, 244, 0, 0.1); }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
